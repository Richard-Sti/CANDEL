# =============================================================================
# Core CANDEL paths
# =============================================================================

root_main = "/mnt/users/rstiskalek/CANDEL/"
root_data = "/mnt/users/rstiskalek/CANDEL/"
root_results = "/mnt/users/rstiskalek/CANDEL/"
python_exec = "/mnt/users/rstiskalek/CANDEL/venv_candel/bin/python"
machine = "glamdring"

# =============================================================================
# Runtime and cluster submission
# =============================================================================

# If true, submit.sh runs jobs against the frozen snapshot at
# CANDEL_FROZEN_ROOT (produced by freeze_candel.sh). If false or
# missing, jobs run directly from the live source tree at CANDEL_ROOT.
# Default when absent: false.
use_frozen = false

# Optional: modules to `module add` before the job runs.
# Space-separated; empty or missing = no modules.
# `modules_gpu` overrides `modules` for GPU jobs.
modules     = ""
modules_gpu = ""

# =============================================================================
# GPU library path overrides
# =============================================================================

# LD_LIBRARY_PATH entries prepended for GPU jobs. Safe default is an empty
# list — modern loaders resolve the pip-bundled NVIDIA libs via RPATH.
# Populate only on clusters where JAX fails to find cuDNN/cuBLAS (e.g.
# glamdring's older stack). Empty or missing = nothing is prepended.
gpu_ld_library_path = [
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cublas/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cuda_cupti/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cuda_nvrtc/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cuda_runtime/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cudnn/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cufft/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cusolver/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/cusparse/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/nccl/lib",
    "/mnt/users/rstiskalek/CANDEL/venv_candel/lib/python3.11/site-packages/nvidia/nvjitlink/lib",
    "/usr/local/shared/python/3.11.4/lib",
    "/usr/local/cuda/lib64",
]

