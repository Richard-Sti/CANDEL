###############################################################################
#                               Inference                                     #
###############################################################################

[inference]
num_warmup = 750
num_samples = 1000
num_chains = 2
chain_method = "sequential"
seed = 42
init_maxiter = 500

###############################################################################
#                                 Data                                        #
###############################################################################

[data]
# Not used for mock data (CepheidData.from_arrays bypasses file loading)
R21_MW = "dummy.csv"

###############################################################################
#                                 Model                                       #
###############################################################################

[model]
disable_all_selection = false
model_type = "forward"
distance_prior = "volume"
shared_scatter = true
n_mc_selection = 1
mc_seed = 9999
epsilon_OH = 0.06
use_Q = false
anchors = []

[model.disk_prior]
R_sun = 8.122

[model.spiral_arms]
apply = false

[model.selection_mc]
ell_min = 0.0
ell_max = 360.0
b_min = -90.0
b_max = 90.0

# --- C22 (not used in this config) ---
[model.C22]
d_min = 0.3
d_max = 10.0
d_spacing = 0.05

[model.C22.selection]
apply_mW = false
apply_AH = false
apply_pi = false
apply_logP = false

# --- C27 campaign (parallax-selected) ---
[model.C27]
d_min = 0.3
d_max = 2.0
d_spacing = 0.01

[model.C27.selection]
apply_pi = true
pi_min = 0.8
pi_smooth = false
pi_width = 0.0
apply_mW = false
delta_pi_max = 0.1

# --- Priors ---

[model.priors.M_H_1]
dist = "uniform"
low = -6.5
high = -5.0

[model.priors.b_W]
dist = "uniform"
low = -4.0
high = -2.5

[model.priors.Z_W]
dist = "uniform"
low = -1.0
high = 1.0

[model.priors.sigma_int]
dist = "uniform"
low = 0.01
high = 0.2

[model.priors.delta_pi]
dist = "uniform"
low = -0.1
high = 0.1

[model.priors.f_pi]
dist = "delta"
value = 1.0

[model.priors.mu_logP]
dist = "uniform"
low = -2.5
high = 2.5

[model.priors.sigma_logP]
dist = "uniform"
low = 0.01
high = 1.0

[model.priors.mu_logP_C27]
dist = "uniform"
low = -0.5
high = 2.5

[model.priors.sigma_logP_C27]
dist = "uniform"
low = 0.01
high = 1.0

[model.priors.mu_OH]
dist = "uniform"
low = -0.5
high = 0.5

[model.priors.sigma_OH]
dist = "uniform"
low = 0.01
high = 1.0

###############################################################################
#                                  I/O                                        #
###############################################################################

[io]
output_file = "mock_pi_samples.hdf5"
