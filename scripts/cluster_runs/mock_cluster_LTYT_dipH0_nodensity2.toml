# Configuration for mock cluster LTYT analysis WITH H0 dipole
# Matches nodensity2 inference settings (b1=0, no MNR, no density prior)
# Paths will be updated by the script to use absolute paths

root_main = "./"
python_exec = "python"
machine = "local"

[inference]
model = "ClustersModel"
shared_params = "none"
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
seed = 44
compute_log_density = true
compute_evidence = false
track_log_density_per_sample = false
num_chains_harmonic = 10
skip_if_exists = false

[pv_model]
kind = "precomputed_los_Carrick2015"
galaxy_bias = "linear"
which_Vext = "constant"
Vext_per_pix_nside = 1
which_A = "constant"
A_per_pix_nside = 1

r_limits_malmquist = [0.1, 1401]
num_points_malmquist = 1401
los_decay_scale = 20.0
density_prior = false

[model]
Om = 0.3
use_MNR = true
marginalize_eta = false

[model.eta_grid]
k_sigma = 5
n_grid = 31

# Fix logT hyperpriors to match mock generation values
[model.priors.logT_prior_mean]
dist = "delta"
value = 0.0

[model.priors.logT_prior_std]
dist = "delta"
value = 0.2

[model.priors.h]
dist = "delta"
value = 1.0

[model.priors.b1]
dist = "delta"
value = 0.0

[model.priors.beta]
dist = "normal"
loc = 0.43
scale = 0.02

[model.priors.alpha]
dist = "delta"
value = 0.0

[model.priors.alpha_low]
dist = "delta"
value = 0.0

[model.priors.alpha_high]
dist = "delta"
value = 0.0

[model.priors.log_rho_t]
dist = "delta"
value = 0.0

[model.priors.rho12]
dist = "uniform"
low = 0.0
high = 0.95

[model.priors.sigma_int]
dist = "jeffreys"
low = 0.05
high = 0.5

[model.priors.sigma_LT]
dist = "jeffreys"
low = 0.07
high = 0.35

[model.priors.sigma_YT]
dist = "jeffreys"
low = 0.07
high = 0.25

[model.priors.A_LT]
dist = "uniform"
low = -2
high = 2.5

[model.priors.B_LT]
dist = "uniform"
low = 1.5
high = 3

[model.priors.A_YT]
dist = "uniform"
low = -0.5
high = 2.5

[model.priors.B_YT]
dist = "uniform"
low = 1.5
high = 3

[model.priors.sigma_v]
dist = "jeffreys"
low = 150.0
high = 600.0

[model.priors.Vext]
dist = "delta"
value = [0.0, 0.0, 0.0]

[model.priors.Vext_quad]
dist = "delta"
value = [
    [0, 0],
    [0, 0],
    [0, 0],
]

[model.priors.zeropoint_dipole]
dist = "delta"
value = [0, 0, 0]

[model.priors.zeropoint_quad]
dist = "delta"
value = [
    [0, 0],
    [0, 0],
    [0, 0],
]

# H0 DIPOLE - fractional δH/H
[model.priors.H0_dipole]
dist = "vector_uniform_fixed"
low = 0.0
high = 0.15

[model.priors.R_dist_emp]
dist = "uniform"
low = 1
high = 250

[model.priors.p_dist_emp]
dist = "truncated_normal"
low = 0.0
mean = 2.0
scale = 0.1

[model.priors.n_dist_emp]
dist = "uniform"
low = 0.3
high = 1.5

[model.priors.Vext_sigma]
dist = "uniform"
low = 0.0
high = 1000.0

[io]
root_output = "results/mocks_noMNR"
catalogue_name = "Clusters_mock_0"
apply_Ez_correction = true
fname_output = "results/mocks_noMNR/dipole.hdf5"

# This section will be updated by the script
[io.Clusters_mock]
root = "PLACEHOLDER_MOCK_DIR"

[io.Clusters]
which_relation = "LTYT"
zcmb_max = 0.45
