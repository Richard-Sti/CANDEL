root_main = "./"
python_exec = "python"
machine = "local"



###############################################################################
#                               Inference                                     #
###############################################################################

[inference]
model = "ClustersModel"
shared_params = "none"

num_warmup = 500
num_samples = 500
num_chains = 1
chain_method = "sequential"
seed = 44
compute_log_density = true
compute_evidence =  true
track_log_density_per_sample = false
num_chains_harmonic = 10

skip_if_exists = false
###############################################################################
#                           Peculiar velocity model                           #
###############################################################################

[pv_model]
# Default kind. This gets overwritten if using a submission script.
kind = "precomputed_los_2mpp_zspace" # or "Vext"

galaxy_bias = "linear"  # Ignored unless having an underlying density field
which_Vext = "radial_magnitude"
Vext_per_pix_nside = 1

# Per-pixel zeropoint (calibration) configuration
# Options: "constant", "per_pix", "radial_binned", "radial_binned_dipole"
which_zeropoint = "constant"

# Per-pixel H0 (cosmological anisotropy) configuration
# Options: "constant", "per_pix"
which_H0 = "constant"

# Shared nside for per-pixel modes (both zeropoint_pix and H0_pix)
anisotropy_per_pix_nside = 1

# Zeropoint parameterization:
# - "fracH0": prior is flat in fractional δH, converted to magnitude internally (recommended)
# - "magnitude": prior is flat in magnitude ΔA (legacy behavior)
zeropoint_parameterization = "magnitude"

# Legacy config (deprecated, use which_zeropoint instead)
which_A = "constant"
A_per_pix_nside = 1

# Radial binned Vext configuration
Vext_radial_bin_edges = [0.0,0.075,0.35]

# Legacy flag: use_zspace is now auto-detected when H0 or Vext varies
# Kept for backward compatibility
use_zspace = false

# (Inhomogeneus Malmquist bias settings and extrapolation), in units of Mpc / h
r_limits_malmquist = [0.1, 1401]
num_points_malmquist = 1001

los_decay_scale = 20.0
density_prior = false

###############################################################################
#                                 Model                                       #
###############################################################################

[model]
Om = 0.3
use_MNR = false
marginalize_eta = true

[model.eta_grid]
k_sigma = 5
n_grid = 31

[model.priors.h]
dist = "delta"
value = 1.0

[model.priors.b1]
dist = "delta"
value = 0.0

[model.priors.beta]
dist = "normal"
loc = 0.43
scale = 0.02

[model.priors.alpha]
dist = "delta"
value = 0.0

[model.priors.alpha_low]
dist = "delta"
value = 0.0

[model.priors.alpha_high]
dist = "delta"
value = 0.0

[model.priors.log_rho_t]
dist = "delta"
value = 0.0

[model.priors.sigma_int]
dist = "jeffreys"
low = 0.05
high = 0.5

[model.priors.sigma_LT]
dist = "jeffreys"
low = 0.05
high = 0.5

[model.priors.sigma_YT]
dist = "jeffreys"
low = 0.05
high = 0.5

[model.priors.A_LT]
dist = "uniform"
low = -2
high = 2.5

[model.priors.B_LT]
dist = "uniform"
low = 1.5
high = 3

[model.priors.A_YT]
dist = "uniform"
low = -0.5
high = 2.5

[model.priors.B_YT]
dist = "uniform"
low = 1.5
high = 3


[model.priors.sigma_v]
dist = "jeffreys"
low = 150.0
high = 3000.0

[model.priors.Vext]
dist = "vector_uniform_fixed"
low = 0.0
high = 5000.0

[model.priors.Vext_pix]
dist = "array_uniform"
low = -10000.0
high = 10000.0
nval = 12

[model.priors.Vext_quad]
dist = "delta"
value = [[0, 0], [0, 0], [0, 0]]
#dist = "vector_uniform_fixed"
#low = 0.0
#high = 0.3

[model.priors.Vext_radial]
dist = "vector_radial_spline_uniform"
low = 0
high = 5000
rknot = [0, 250, 500, 1000]
k = 1
endpoints = "not-a-knot"

[model.priors.Vext_radmag]
dist = "vector_radialmag_uniform"
low = 0
high = 5000
rknot = [0, 250, 500, 1000]
method = "cubic"
# Full sky direction with signed magnitude
half_sky = false

[model.priors.zeropoint_dipole]
dist = "delta"
value = [0,0,0]
#dist = "vector_uniform_fixed"
#low = 0.0
#high = 0.3

# Legacy A_pix prior (deprecated, use zeropoint_pix instead)
# Kept for backward compatibility with old config files
[model.priors.A_pix]
dist = "array_uniform"
low = -10.0
high = 10.0
nval = 12

[model.priors.zeropoint_quad]
dist = "delta"
value = [[0, 0], [0, 0], [0, 0]]
#dist = "quadrupole_uniform_fixed"
#low = 0.0
#high = 0.15

[model.priors.zeropoint_pix]
dist = "array_uniform"
low = -0.1
high = 0.1
nval = 12  # Computed from anisotropy_per_pix_nside at runtime

# H0 anisotropy priors (fractional δH - affects z→r conversion)
# For dipH0 runs, set dist = "vector_uniform_fixed" with low=0 high=0.15
[model.priors.H0_dipole]
dist = "delta"
value = [0,0,0]
#dist = "vector_uniform_fixed"
#low = 0.0
#high = 0.15  # 15% fractional anisotropy

[model.priors.H0_quad]
dist = "delta"
value = [[0, 0], [0, 0], [0, 0]]
#dist = "quadrupole_uniform_fixed"
#low = 0.0
#high = 0.15

[model.priors.H0_pix]
dist = "array_uniform"
low = -0.1
high = 0.1
nval = 12  # Computed from anisotropy_per_pix_nside at runtime

# Legacy parameter (deprecated, use H0_dipole instead)
[model.priors.dH0]
dist = "delta"
value = [0,0,0]


[model.priors.R_dist_emp]
dist = "uniform"
low = 1
high = 450

[model.priors.p_dist_emp]
dist = "truncated_normal"
low = 0.0
mean = 2.0
scale = 0.1

[model.priors.n_dist_emp]
dist = "uniform"
low = 0.1
high = 4.0


################################################################################
#                                  Data                                        #
################################################################################

[io]
root_output = "results/main"
# Default catalogue name and output path. This gets overwritten
# if using a submission script.
catalogue_name = "Clusters"
apply_Ez_correction = true
#catalogue_name = "CF4_mock_0"

fname_output = "results/config_clusters.hdf5"


[io.Clusters]
root = "data/Clusters"
zcmb_max = 0.45
which_relation = "YT"
finite_logY = true
remove_noY = true
only_missing_Y = false
convert_to_CMB_frame = true

los_file = "data/Clusters/los_Clusters_<X>.hdf5"

nsamples_subsample = "none"
seed_subsample = 42

[io.Clusters_hasY]
root = "data/Clusters"
zcmb_max = 0.45
which_relation = "LTYT"
finite_logY = true
remove_noY = true
only_missing_Y = false
convert_to_CMB_frame = true

los_file = "data/Clusters/los_Clusters_<X>.hdf5"

nsamples_subsample = "none"
seed_subsample = 42

[io.Clusters_LTtail]
root = "data/Clusters"
zcmb_max = 0.45
which_relation = "LT"
finite_logY = false
remove_noY = false
only_missing_Y = true
convert_to_CMB_frame = true

los_file = "data/Clusters/los_Clusters_<X>.hdf5"

nsamples_subsample = "none"
seed_subsample = 42


########
# Static paths to define a general acces to the catalogues and reconstruction
# fields without applying any cuts etc.
########

[io.PV_main]


[io.PV_main.Clusters]
root = "data/Clusters"
return_all = true
los_file = "data/Clusters/los_Clusters_<X>.hdf5"


[io.reconstruction_main]
# Distance over which to interpolate the 3D grids along the source LOS.
rmin = 0.001
rmax = 330.0
num_steps = 501
[io.reconstruction_main.manticore_2MPP_MULTIBIN_N256_DES_V2]
fpath_root = "/mnt/extraspace/rstiskalek/MANTICORE/2MPP_MULTIBIN_N256_DES_V2/sph_fields_new_feb/sph_fields"

[io.reconstruction_main.Carrick2015]
path_density = "data/fields/carrick2015_twompp_density.npy"
path_velocity = "data/fields/carrick2015_twompp_velocity.npy"

[io.reconstruction_main.2mpp_zspace]
# LOS data are loaded from data/Clusters/los_Clusters_2mpp_zspace.hdf5
