###############################################################################
#                               Inference                                     #
###############################################################################

[inference]
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
seed = 42
dense_mass_params = [
    "H0", "M_TRGB", "sigma_int_TRGB",
    "a_TFR", "b_TFR", "sigma_int_TFR",
    "sigma_v",
    "Vext_phi", "Vext_cos_theta", "Vext_mag",
    "beta", "b1",
    "mu_LMC", "mu_N4258",
    "eta_mean", "eta_std",
    "mag_lim_TRGB", "mag_lim_TRGB_width",
]

###############################################################################
#                                 Model                                       #
###############################################################################

[model]
Om = 0.3
which_run = "EDD_TRGB_2MTF"

use_reconstruction = true
which_bias = "linear"

# TRGB group selection
which_selection_trgb = "TRGB_magnitude"
# TFR-only group selection
which_selection_tfr = "magnitude"

distmod_limits = [10, 38]
r_limits_malmquist = [0.01, 200]
delta_mu = 0.03
dr_max = 0.25

n_gauss_hermite = 5

# TRGB selection thresholds
mag_lim_TRGB = "infer"
mag_lim_TRGB_width = "infer"

# TFR selection thresholds
mag_lim_TFR = 11.25
eta_min_sel = -0.1
eta_max_sel = 0.2

# H0
[model.priors.H0]
dist = "uniform"
low = 10
high = 100

# TRGB absolute magnitude
[model.priors.M_TRGB]
dist = "normal"
loc = -4.05
scale = 0.5

# TRGB intrinsic scatter
[model.priors.sigma_int_TRGB]
dist = "maxwell"
scale = 0.0627

# TFR zero-point
[model.priors.a_TFR]
dist = "uniform"
low = -25.0
high = -15.0

# TFR slope
[model.priors.b_TFR]
dist = "uniform"
low = -15.0
high = 0.0

# TFR curvature (fixed)
[model.priors.c_TFR]
dist = "delta"
value = 0.0

# TFR intrinsic scatter
[model.priors.sigma_int_TFR]
dist = "uniform"
low = 0.01
high = 2.0

# Peculiar velocities
[model.priors.sigma_v]
dist = "maxwell"
scale = 157

[model.priors.Vext]
dist = "vector_uniform_fixed"
low = 0.0
high = 1000

# Reconstruction
[model.priors.beta]
dist = "normal"
loc = 0.43
scale = 0.02

[model.priors.b1]
dist = "truncated_normal"
mean = 1.2
scale = 0.1
low = 0.0
high = 5.0

# TRGB selection thresholds (inferred)
[model.priors.mag_lim_TRGB]
dist = "uniform"
low = 20.0
high = 29.0

[model.priors.mag_lim_TRGB_width]
dist = "uniform"
low = 0.05
high = 1.5

###############################################################################
#                             TRGB Calibration                                #
###############################################################################

[model.anchors]
mu_LMC = 18.477
e_mu_LMC = 0.026
mag_LMC_TRGB = 14.456
e_mag_LMC_TRGB = 0.018
mu_N4258 = 29.398
e_mu_N4258 = 0.032
mag_N4258_TRGB = 25.347
e_mag_N4258_TRGB = 0.0443

###############################################################################
#                                  Data                                       #
###############################################################################

[io]
root_output = "results/EDD_TRGB_2MTF"
fname_output = "results/EDD_TRGB_2MTF/test.hdf5"

load_host_los = true
load_rand_los = true

los_file_random = "data/los_random_<X>.hdf5"
los_r0_decay_scale = 5


[io.PV_main]

[io.PV_main.EDD_TRGB]
root = "data/EDD_TRGB"
los_file = "data/EDD_TRGB/los_EDD_TRGB_<X>.hdf5"
which_host_los = "Carrick2015"

[io.PV_main.EDD_2MTF]
root = "data/EDD_2MTF"
los_file = "data/EDD_2MTF/los_EDD_2MTF_<X>.hdf5"
which_host_los = "Carrick2015"
eta_min = -0.1
eta_max = 0.2


[io.reconstruction_main]
rmin = 0.1
rmax = 200
num_steps = 301

[io.reconstruction_main.Carrick2015]
path_density = "data/fields/carrick2015_twompp_density.npy"
path_velocity = "data/fields/carrick2015_twompp_velocity.npy"
