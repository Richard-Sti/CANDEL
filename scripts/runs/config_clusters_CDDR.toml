root_main = "./"
python_exec = "python"
machine = "local"

[inference]
model = [
    "ClustersModel",
    "ClustersModel",
]
shared_params = "A_LT,B_LT,A_YT,B_YT,sigma_LT,sigma_YT,sigma_v,R_dist_emp,p_dist_emp,n_dist_emp,beta,epsilon_CDDR,logT_prior_mean,logT_prior_std"
num_warmup = 500
num_samples = 500
num_chains = 1
chain_method = "sequential"
seed = 44
compute_log_density = true
compute_evidence = true
track_log_density_per_sample = false
num_chains_harmonic = 10
skip_if_exists = false

[pv_model]
