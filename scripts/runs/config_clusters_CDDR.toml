    0.1,
    1401,
]
num_points_malmquist = 1401
los_decay_scale = 20.0
density_prior = false

[model]
Om = 0.3
use_MNR = true
marginalize_logT =  false
marginalize_eta = true
test_CDDR = true

[model.logT_grid]
