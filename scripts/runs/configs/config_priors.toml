###############################################################################
#                          Shared default priors                              #
###############################################################################
# These are sensible defaults shared across H0 and PV flow models.
# Run-specific configs can override any of these.

[model]
Om = 0.3

# Hubble constant
[model.priors.H0]
dist = "uniform"
low = 10
high = 100

# Peculiar velocity dispersion
[model.priors.sigma_v]
dist = "maxwell"
scale = 125

# Student-t redshift likelihood degrees of freedom.
[model.priors.nu_cz]
dist = "truncated_normal"
low = 5.0
high = 100.0
mean = 30.0
scale = 10.0

# External bulk flow
[model.priors.Vext]
dist = "vector_uniform_fixed"
low = 0.0
high = 1000

# External velocity monopole: constant (1 DOF)
[model.priors.Vext_mono]
dist = "uniform"
low = -500
high = 500

# External velocity sigmoid monopole (3 DOF: amplitude, transition radius,
# transition angle controlling steepness)
[model.priors.Vext_mono_left]
dist = "uniform"
low = -500
high = 500

[model.priors.Vext_mono_rt]
dist = "uniform"
low = 0
high = 50

[model.priors.Vext_mono_angle]
dist = "uniform"
low = 0.01
high = 1.5607

# External velocity quadrupole (5 DOF: magnitude + two unit vectors)
[model.priors.Vext_quad]
dist = "quadrupole"
low = 0.0
high = 500

# External velocity octupole (7 DOF: magnitude + three unit vectors)
[model.priors.Vext_oct]
dist = "octupole"
low = 0.0
high = 500

# Reconstruction: linear bias
[model.priors.beta]
dist = "normal"
loc = 0.43
scale = 0.1

[model.priors.b1]
dist = "uniform"
low = 0.0
high = 10.0

# Reconstruction: power law bias
[model.priors.alpha]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

# Reconstruction: double power law bias
[model.priors.alpha_low]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

[model.priors.alpha_high]
dist = "truncated_normal"
low = 0.0
mean = 0.5
scale = 1.0

[model.priors.log_rho_t]
dist = "normal"
loc = 0.0
scale = 2.0

# Intrinsic scatter (generic)
[model.priors.sigma_int]
dist = "jeffreys"
low = 0.005
high = 1.0
