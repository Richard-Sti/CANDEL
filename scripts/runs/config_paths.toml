[io.PV_main.SH0ES]
root = "data/SH0ES"
los_file = "data/SH0ES/los_SH0ES_TFR_<X>.hdf5"

[io.PV_main.CF4]
root = "data/CF4"
which_band = "i"
return_all = true
los_file = "data/CF4/los_CF4_TFR_<X>.hdf5"

[io.PV_main.2MTF]
root = "data/2MTF"
return_all = true
los_file = "data/2MTF/los_2MTF_<X>.hdf5"

[io.PV_main.SFI]
