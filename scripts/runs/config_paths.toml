###############################################################################
#                     Shared data and reconstruction paths                    #
###############################################################################

[io]
los_file_random = "data/los_random_<X>.hdf5"
los_r0_decay_scale = 5

# --- Catalog paths ---

[io.PV_main]

[io.PV_main.EDD_TRGB]
root = "data/EDD_TRGB"
los_file = "data/EDD_TRGB/los_EDD_TRGB_<X>.hdf5"

[io.PV_main.EDD_2MTF]
root = "data/EDD_2MTF"
