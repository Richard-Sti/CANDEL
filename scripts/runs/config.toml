###############################################################################
#                               Inference                                     #
###############################################################################

[inference]
model = "PantheonPlusModel"
shared_params = "none"

num_warmup = 1000
num_samples = 5000
num_chains = 4
chain_method = "parallel"
seed = 44
compute_log_density = true
compute_evidence = true
track_log_density_per_sample = false
num_chains_harmonic = 10

skip_if_exists = false

###############################################################################
#                           Peculiar velocity model                           #
###############################################################################

[pv_model]
# Default kind. This gets overwritten if using a submission script.
kind = "precomputed_los_Carrick2015"
# kind = "Vext"
galaxy_bias = "linear_from_beta"  # Ignored unless having an underlying density field
# galaxy_bias = "linear"  # Ignored unless having an underlying density field
quadratic_bias_delta0 = 0.0  # Expansion point for quadratic bias
which_Vext = "constant"

# (Inhomogeneous Malmquist bias settings and extrapolation), in units of Mpc / h.
r_limits_malmquist = "auto"
dr_malmquist = 0.5

los_decay_scale = 10.0

Vext_per_pix_nside = "none"
which_distance_prior = "empirical"

###############################################################################
#                      Optional interpolator settings                         #
###############################################################################


[interp_kwargs.Distance2Distmod_withOm]
nr = 1000
Om_max = 3.0
nOm = 1000

[interp_kwargs.Distance2Redshift_withOm]
nr = 1000
Om_max = 3.0
nOm = 1000


###############################################################################
#                                 Model                                       #
###############################################################################

[model]
Om = 0.3
marginalize_eta = true

# CSP selection integral grid settings (CSPModel)
# LSQ data ranges: st=[0.50, 1.22], BV=[-0.05, 0.47], zcmb=[0.021, 0.126]
r_limits_selection = "auto"
n_r_selection = 51
s_limits_selection = "auto"
n_s_selection = 15
BV_limits_selection = "auto"
n_BV_selection = 15
auto_limits_nsigma = 5.0  # padding for auto limits: data range ± n*sigma
zcmb_limits_selection = "auto"
# Use 2-component GMM for stretch distribution (CSPModel)
use_stretch_gmm = false

[model.eta_grid]
n_grid = 5

[model.priors.h]
# Currently sampled only for the CF4 calibrated data.
# dist = "delta"
# value = 1.0
dist = "uniform"
low = 0.01
high = 1.0

[model.priors.Om]
# Currently sampled only for the CF4 calibrated data.
# dist = "delta"
# value = 0.3
dist = "uniform"
low = 0.01
high = 2.99

[model.priors.alpha]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

[model.priors.alpha_low]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

[model.priors.alpha_high]
dist = "truncated_normal"
low = 0.0
mean = 0.5
scale = 1.0

[model.priors.log_rho_t]
dist = "normal"
loc = 0.0
scale = 2.0

[model.priors.b1]
dist = "normal"
loc = 1
scale = 1.0

[model.priors.b2]
dist = "normal"
loc = 0
scale = 1.0

[model.priors.delta_b1]
dist = "normal"
loc = 0.0
scale = 0.04

[model.priors.beta]
# dist = "uniform"
# low = 0.0
# high = 2.0
dist = "normal"
loc = 0.43
scale = 0.1

[model.priors.sigma_int]
dist = "jeffreys"
low = 0.005
high = 1.0

[model.priors.sigma_int_SN]
dist = "jeffreys"
low = 0.005
high = 1.0

[model.priors.sigma_log_theta]
dist = "jeffreys"
low = 0.001
high = 0.5

# TFR priors
[model.priors.TFR_zeropoint]
dist = "normal"
loc = -19.8
scale = 2.0

[model.priors.TFR_slope]
dist = "normal"
loc = -10.0
scale = 2.0

[model.priors.TFR_curvature]
dist = "normal"
loc = 10
scale = 5.0

[model.priors.zeropoint_dipole]
dist = "delta"
value = [0.0, 0.0, 0.0]
# dist = "vector_uniform_fixed"
# low = 0.0
# high = 0.3

# SN priors (Pantheon+, Foundation, LOSS)
[model.priors.SN_absmag]
dist = "normal"
loc = -18.5
scale = 2.0

[model.priors.SN_alpha]
dist = "normal"
loc = 0.15
scale = 1.0

[model.priors.SN_beta]
dist = "normal"
loc = 3.0
scale = 1.0

###############################################################################
#                       CSP Model Priors (CSPModel)                           #
###############################################################################

# Tripp standardization: m_true = M_B + mu(r) - alpha_tripp*(s-1) + beta_tripp*BV
[model.priors.M_B]
dist = "normal"
loc = -18.5
scale = 1.0

[model.priors.alpha_tripp]
dist = "truncated_normal"
low = 0.0
mean = 0.7
scale = 0.5

[model.priors.beta_tripp]
dist = "truncated_normal"
low = 0.0
mean = 2.5
scale = 1.0

# Population hyperparameters for latent (s, BV)
[model.priors.mu_s]
dist = "normal"
loc = 1.0
scale = 0.2

[model.priors.sigma_s]
dist = "truncated_normal"
low = 0.01
mean = 0.1
scale = 0.1

[model.priors.mu_BV]
dist = "normal"
loc = 0.0
scale = 0.2

[model.priors.sigma_BV]
dist = "truncated_normal"
low = 0.01
mean = 0.1
scale = 0.1

[model.priors.rho_pop]
dist = "uniform"
low = -0.999
high = 0.999

# GMM hyperparameters for stretch (when use_stretch_gmm = true)
# mu_s2 = mu_s + delta_mu_s, so delta_mu_s > 0 ensures mu_s2 > mu_s
[model.priors.delta_mu_s]
dist = "truncated_normal"
low = 0.0
mean = 0.2
scale = 0.2

[model.priors.sigma_s2]
dist = "truncated_normal"
low = 0.01
mean = 0.1
scale = 0.1

[model.priors.rho_pop2]
dist = "uniform"
low = -0.999
high = 0.999

[model.priors.w_s]
dist = "uniform"
low = 0.0
high = 1.0

# Selection parameters: m_sel = m_obs + alpha_sel*(s-1) - beta_sel*BV
# p(S=1|obs) = Phi((m_lim - m_sel) / sigma_sel)
[model.priors.m_lim]
# dist = "delta"
# value = 19.0
dist = "uniform"
low = 10.0
high = 22.0

[model.priors.alpha_sel]
# dist = "delta"
# value = 0.0
dist = "normal"
loc = 0.0
scale = 1.0

[model.priors.beta_sel]
# dist = "delta"
# value = 0.0
dist = "normal"
loc = 0
scale = 1.0

[model.priors.sigma_sel]
# dist = "delta"
# value = 0.5
dist = "truncated_normal"
low = 0.001
mean = 0.5
scale = 0.5


## Cluster scaling relation priors
[model.priors.CL_A]
dist = "uniform"
low = -10
high = 10

[model.priors.CL_B]
dist = "uniform"
low = -5
high = 5

[model.priors.CL_C]
dist = "uniform"
low = -5.0
high = 5.0

[model.priors.CL_C_intercept]
dist = "uniform"
low = -5.0
high = 5.0

# FP priors
[model.priors.FP_a]
dist = "normal"
loc = 1.0
scale = 5.0

[model.priors.FP_b]
dist = "normal"
loc = -1.0
scale = 5.0

[model.priors.FP_c]
dist = "normal"
loc = -1
scale = 5.0

# Velocity priors
[model.priors.sigma_v]
# dist = "jeffreys"
# low = 1
# high = 2500
dist = "maxwell"
scale = 200

[model.priors.Vext]
dist = "vector_uniform_fixed"
low = 0.0
high = 2500
# dist = "delta"
# value = [0.0, 0.0, 0.0]

[model.priors.Vext_radial]
dist = "vector_radial_uniform"
low = 0.0
high = 5000

rknot = [0, 250, 600]
method = "cubic"

[model.priors.Vext_radial_magnitude]
dist = "vector_radialmag_uniform"
low = 0.0
high = 5000

rknot = [0, 50, 150]
method = "cubic"

[model.priors.Vext_sigma]
dist = "uniform"
low = 1
high = 10_000

[model.priors.Rdust]
# 0.19 +- 0.01 for W1. For W2 should be 0.15 +- 0.01. I take it a little bit
# larger to be conservative.
dist = "normal"
loc = 0.19
scale = 0.05

[model.priors.R_dist_emp]
dist = "uniform"
low = 1.0
high = 300

[model.priors.p_dist_emp]
dist = "truncated_normal"
low = 0.0
mean = 2.0
scale = 0.1

[model.priors.n_dist_emp]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 30

# H0 transition priors
[model.priors.dH0]
dist = "normal"
loc = 0.0
scale = 1.0

[model.priors.R_H0_alpha]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 5.0


################################################################################
#                                  Data                                        #
################################################################################

[io]
root_output = "results"
# Default catalogue name and output path. This gets overwritten
# if using a submission script.
# catalogue_name = ["CF4_W1", "CF4_i"]
catalogue_name = "PantheonPlusLane"
fname_output = "results/test.hdf5"


[io.CF4_mock]
root = "data/CF4_mock"
add_eta_selection = true


[io.CF4_W1]
