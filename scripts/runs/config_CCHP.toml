# Paths and execution
root_main = "/Users/rstiskalek/Projects/CANDEL/"
python_exec = "/Users/rstiskalek/Projects/CANDEL/venv_candel/bin/python"
machine = "local"

# Inference settings
[inference]
num_warmup = 1000
num_samples = 5000
num_chains = 1
chain_method = "parallel"
seed = 42

# Model hyperparameters
[model]
Om = 0.3
distmod_limits = [20.0, 40.0]
use_reconstruction = true
galaxy_bias = "double_powerlaw"
which_selection = "none"
which_run = "CCHP"

# Optional custom limits for anchors (distance modulus)
distmod_limits_LMC = [18.0, 19.0]
distmod_limits_N4258 = [29.0, 29.8]

r_limits_malmquist = [0.01, 101.0]
num_points_malmquist = 301

cz_lim_selection = 2000.0
cz_lim_selection_width = 300.0

mag_lim_SN = 13.0
mag_lim_SN_width = 0.3

[model.priors.H0]
dist = "uniform"
low = 10.0
high = 100.0

[model.priors.sigma_int]
dist = "delta"
value = 0.0

[model.priors.M_TRGB]
dist = "normal"
loc = -4.05
scale = 0.2

[model.priors.M_SN]
dist = "normal"
loc = -19.3
scale = 0.3

[model.priors.sigma_v]
dist = "jeffreys"
low = 25.0
high = 1500.0

[model.priors.Vext]
dist = "vector_uniform_fixed"
low = 0
high = 3000.0

[model.priors.b1]
dist = "normal"
loc = 1.2
scale = 0.1

[model.priors.beta]
# dist = "normal"
# loc = 0.47
# scale = 0.02
dist = "delta"
value = 1.0

[model.priors.alpha_low]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

[model.priors.alpha_high]
dist = "truncated_normal"
low = 0.0
mean = 1.0
scale = 1.0

[model.priors.log_rho_t]
dist = "normal"
loc = 0.0
scale = 1.0

# IO settings
[io]
fname_output = "results/CCHP/test.hdf5"
load_host_los = true
load_rand_los = true

# Templates for LOS files; <X> will be replaced by `which_host_los` if set.
los_file = "data/CCHP/los_<X>.hdf5"
los_file_random = "data/los_random_<X>.hdf5"
# which_host_los = "Carrick2015"
which_host_los = "manticore_2MPP_MULTIBIN_N256_DES_V2"
los_r0_decay_scale = 5

[io.CCHP]
# Path to the processed TSV produced in notebooks/paper_CCHP/process_data.ipynb
path = "data/CCHP/cchp_processed_data.tsv"
los_file = "data/CCHP/los_<X>.hdf5"

[io.CCHP_redshift_source]
# Use cz_cmb (table default) or cz_cmb_NED (already in the TSV); no online queries.
kind = "cz_cmb"

[io.reconstruction_main]
rmin = 0.1
rmax = 100
num_steps = 201

[io.reconstruction_main.Carrick2015]
path_density = "data/fields/carrick2015_twompp_density.npy"
path_velocity = "data/fields/carrick2015_twompp_velocity.npy"

[io.reconstruction_main.manticore_2MPP_MULTIBIN_N256_DES_V2]
fpath_root = "/mnt/extraspace/rstiskalek/MANTICORE/2MPP_MULTIBIN_N256_DES_V2/sph_fields_new_feb/sph_fields"
