# Megamaser disk H0 model configuration.
#
# Set galaxy = "CGCG074-064" (or any galaxy name) for a single-galaxy run.
# Set galaxy = "joint" to fit all galaxies simultaneously with shared H0.
# Per-galaxy settings override the shared defaults below.

[inference]
sampler = "nss"  # "nuts" or "nss"
seed = 42

# NUTS settings
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
dense_mass_blocks = [
    ["D_c", "eta", "dv_sys", "i0", "di_dr", "Omega0", "dOmega_dr", "x0", "y0"],
    ["sigma_v_sys", "sigma_y_floor", "sigma_a_floor", "sigma_x_floor"],
]
init_maxiter = 0
init_method = "config"
max_tree_depth = 10

# NSS settings 
n_live = 5000
num_mcmc_steps = 0  # 0 = use ndim (p=d recommendation)
num_delete = 250
termination = -3

[model]
which_run = "maser_disk"
Om = 0.315
galaxy = "NGC5765b"

use_selection = false
marginalise_r = true
D_c_prior = "uniform"  # "uniform" or "volume" (p(D_c) ∝ D_c²)

# Physical radius integration bounds [pc] for r marginalization
R_phys_lo = 0.01
R_phys_hi = 2.0

# -----------------------------------------------------------------------
# DE optimizer / Sobol seeding settings
# -----------------------------------------------------------------------

[optimise]
# H0 used ONLY to convert v_sys_obs -> D_estimate for narrowing the Sobol
# survey range of D_c. Does NOT affect inference or the DE search bounds.
H0_for_D_estimate = 70.0
# Peculiar velocity scatter (km/s) for Sobol D_c range: D ± n_sigma * sigma_v / H0
D_sobol_sigma_v = 500.0
D_sobol_n_sigma = 5

# -----------------------------------------------------------------------
# Shared priors (apply to all galaxies unless overridden)
# -----------------------------------------------------------------------

[model.priors.H0]
dist = "delta"
value = 73.0

[model.priors.sigma_pec]
# dist = "uniform"
# low = 50.0
# high = 500.0
dist = "delta"
value = 250

# D prior: set D_lo, D_hi per galaxy below.
# The runner reads these and sets a Uniform(D_lo, D_hi) prior.


[model.priors.eta]
dist = "uniform"
low = 3.0
high = 9.0

[model.priors.dv_sys]
dist = "normal"
loc = 0.0
scale = 300.0

[model.priors.x0]
dist = "normal"
loc = 0.0
scale = 500.0

[model.priors.y0]
dist = "normal"
loc = 0.0
scale = 500.0

[model.priors.i0]
dist = "sine_angle"
low = 60.0
high = 110.0

[model.priors.Omega0]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.dOmega_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.di_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.sigma_x_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_y_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_v_sys]
dist = "truncated_normal"
mean = 2.0
scale = 1.0
low = 0.0
high = 100.0

[model.priors.sigma_v_hv]
dist = "truncated_normal"
mean = 2.0
scale = 1.0
low = 0.0
high = 100.0

[model.priors.sigma_a_floor]
dist = "truncated_normal"
mean = 0.3
scale = 0.15
low = 0.0
high = 0.75

# Eccentricity priors (only used when model/use_ecc = true)
[model.priors.ecc]
dist = "uniform"
low = 0.0
high = 0.5

[model.priors.omega_disk]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.D_lim]
dist = "uniform"
low = 50.0
high = 300.0

[model.priors.D_width]
dist = "uniform"
low = 5.0
high = 100.0

[io]
root_output = "results/Megamaser"

[io.maser_data]
root = "data/Megamaser"

# -----------------------------------------------------------------------
# Per-galaxy settings
# -----------------------------------------------------------------------

# D_ref, e_D_ref: reference distance [Mpc] and 1σ uncertainty.
