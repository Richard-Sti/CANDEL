# Megamaser disk H0 model configuration.
#
# Set galaxy = "CGCG074-064" (or any galaxy name) for a single-galaxy run.
# Set galaxy = "joint" to fit all galaxies simultaneously with shared H0.
# Per-galaxy settings override the shared defaults below.

[inference]
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
seed = 42
dense_mass_blocks = [
    ["D_c", "log_MBH", "dv_sys"],
    ["i0", "di_dr"],
    ["Omega0", "dOmega_dr"],
    ["x0", "y0"],
]
init_maxiter = 0
max_tree_depth = 10

[model]
which_run = "maser_disk"
Om = 0.315
galaxy = "NGC5765b"

use_selection = false
marginalise_r = false

# -----------------------------------------------------------------------
# Shared priors (apply to all galaxies unless overridden)
# -----------------------------------------------------------------------

[model.priors.H0]
dist = "delta"
value = 73.0

[model.priors.sigma_pec]
# dist = "uniform"
# low = 50.0
# high = 500.0
dist = "delta"
value = 250

[model.priors.D]
dist = "uniform"
low = 5.0
high = 250.0

[model.priors.log_MBH]
dist = "uniform"
low = 6.0
high = 9.0

[model.priors.R_phys]
dist = "uniform"
low = 0.01
high = 3.0

[model.priors.dv_sys]
dist = "normal"
loc = 0.0
scale = 500.0


[model.priors.x0]
dist = "uniform"
low = -500.0
high = 500.0

[model.priors.y0]
dist = "uniform"
low = -500.0
high = 500.0

[model.priors.i0]
dist = "sine_angle"
low = 60.0
high = 110.0

[model.priors.Omega0]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.dOmega_dr]
dist = "uniform"
low = -20.0
high = 20.0

[model.priors.di_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.sigma_x_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_y_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_v_sys]
dist = "truncated_normal"
mean = 2.0
scale = 2.0
low = 0.0
high = 20.0

[model.priors.sigma_v_hv]
dist = "truncated_normal"
mean = 2.0
scale = 2.0
low = 0.0
high = 20.0

[model.priors.sigma_a_floor]
dist = "truncated_normal"
mean = 0.1
scale = 0.2
low = 0.0
high = 1.0

[model.priors.D_lim]
dist = "uniform"
low = 50.0
high = 300.0

[model.priors.D_width]
dist = "uniform"
low = 5.0
high = 100.0

[io]
root_output = "results/Maser"

[io.maser_data]
root = "data/Megamaser"

# -----------------------------------------------------------------------
# Per-galaxy settings
# -----------------------------------------------------------------------

