[inference]
sampler = "nss"
seed = 42
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
dense_mass_blocks = [
    [
        "H0",
        "D_c",
        "eta",
        "dv_sys",
        "i0",
        "di_dr",
        "Omega0",
        "dOmega_dr",
        "x0",
        "y0",
    ],
    [
        "sigma_v_sys",
        "sigma_y_floor",
        "sigma_a_floor",
        "sigma_x_floor",
    ],
]
init_maxiter = 0
init_method = "config"
max_tree_depth = 10
n_live = 5000
num_mcmc_steps = 0
num_delete = 250
termination = -3

[model]
which_run = "maser_disk"
Om = 0.315
galaxy = "NGC5765b"
use_selection = false
mode = "mode2"
sigma_v_default = 0.25
D_c_prior = "volume"
R_phys_lo = 0.01
R_phys_hi = 2.0

# Unified phi grid knobs (identical in Mode 1 and Mode 2).
# HV (red/blue): 3 uniform sub-ranges centred on the peak:
#   [peak-outer, peak-inner]  (n_phi_hv_low points)
#   [peak-inner, peak+inner]  (n_phi_hv_high points, dense)
#   [peak+inner, peak+outer]  (n_phi_hv_low points)
# Reid convention: red peak at phi=+pi/2, blue peak at phi=-pi/2.
# Values chosen from the 2026-04-18 convergence tests: |Δ|<0.25 nats
# vs 200001-pt full-2π ref across all 5 MCP galaxies (Mode 2) and
# Mode 1 at r_ang_scale=1.
phi_hv_inner_deg = 45.0
phi_hv_outer_deg = 90.0
n_phi_hv_high = 1001
n_phi_hv_low = 301

# Systemic: explicit list of disjoint sub-ranges around phi=0 and
# phi=pi (Reid convention). Each sub-range is uniform, n_phi_sys
# points, trapezoidal.
phi_sys_ranges_deg = [[-45, 45], [135, 225]]
n_phi_sys = 3001

# Mode 1 (marginalise_r = false) uses a denser phi grid — per-spot
# likelihood peaks are narrower than under the r-marginal in Mode 2.
# NGC4258's per-galaxy block overrides these further.
n_phi_hv_high_mode1 = 2001
n_phi_hv_low_mode1 = 501
n_phi_sys_mode1 = 3001

# Mode 2 r-grid knobs.
#   n_r_local: sinh-spaced per-spot grid for HV and sys+accel.
#              Value chosen so CGCG074-064 and NGC5765b (which are
#              r-bottlenecked in Mode 2) converge to |Δ|<0.1 nats.
#   n_r_brute: log-uniform grid for sys-without-accel (many points,
#              since r is unconstrained for these).
#   K_sigma:   half-width (in multiples of the physics-based σ_r) for
#              the sinh transform.
n_r_local = 251
n_r_brute = 501
K_sigma = 5.0

[model.priors.H0]
dist = "uniform"
low = 10.0
high = 200.0

[model.priors.sigma_pec]
dist = "delta"
value = 300

[model.priors.eta]
dist = "uniform"
low = 3.0
high = 9.0

[model.priors.dv_sys]
