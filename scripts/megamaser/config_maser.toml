[inference]
sampler = "nss"
seed = 42

# NUTS / HMC
num_warmup = 2000
num_samples = 2000
num_chains = 1
dense_mass_blocks = [
    [
        "H0",
        "D_c",
        "eta",
        "dv_sys",
        "i0",
        "di_dr",
        "Omega0",
        "dOmega_dr",
        "x0",
        "y0",
    ],
    [
        "sigma_v_sys",
        "sigma_y_floor",
        "sigma_a_floor",
        "sigma_x_floor",
    ],
]
init_maxiter = 0
init_method = "config"
max_tree_depth = 10

# Nested sampling (NSS)
n_live = 5000
num_mcmc_steps = 0
num_delete = 25
termination = -3

[model]
Om = 0.315
use_selection = false
mode = "mode2"
sigma_v_default = 0.25
D_c_prior = "uniform"
R_phys_lo = 0.01
R_phys_hi = 1.5

# Unified phi grid knobs (identical in Mode 1 and Mode 2).
# HV (red/blue): 3 uniform sub-ranges centred on the peak:
#   [peak-outer, peak-inner]  (n_phi_hv_low points)
#   [peak-inner, peak+inner]  (n_phi_hv_high points, dense)
#   [peak+inner, peak+outer]  (n_phi_hv_low points)
# Reid convention: red peak at phi=+pi/2, blue peak at phi=-pi/2.
# Values chosen from the 2026-04-18 convergence tests: |Δ|<0.25 nats
# vs 200001-pt full-2π ref across all 5 MCP galaxies (Mode 2) and
# Mode 1 at r_ang_scale=1.
phi_hv_inner_deg = 30.0
phi_hv_outer_deg = 90.0
n_phi_hv_high = 5001
n_phi_hv_low = 2501

# Systemic: explicit list of disjoint sub-ranges around phi=0 and
# phi=pi (Reid convention). Each sub-range is uniform, n_phi_sys
# points, trapezoidal.
phi_sys_ranges_deg = [[-45, 45], [135, 225]]
n_phi_sys = 5001

# Mode 2 r-grid knobs.
#   n_r_local:  sinh-spaced per-spot grid centred on the posterior
#               peak (Brent-refined from best-of scan vs closed-form).
#   n_r_global: shared log-uniform grid with data-driven range
#               (closed-form seed min/max × padding). Also doubles as
#               the scan grid: its phi-marginal is evaluated to find
#               per-spot seeds before Brent refinement.
#   K_sigma:    half-width (in multiples of the per-spot σ_r) for
#               the local sinh transform.
n_r_local = 256
n_r_global = 128
K_sigma = 10.0

# Per-spot Brent refinement within ±3 global-grid bins of the seed.
# Brent combines parabolic interpolation with golden-section
# fallback.
refine_r_center = true
n_refine_steps = 32

# Spot-axis chunking for the NumPyro likelihood evaluation
# (`_eval_phi_marginal`). Disabled by default — the per-group forward
# intermediate `O(N_group · [n_r ·] n_phi)` fits comfortably for the
# four small-MCP galaxies (≤80 spots/group) at the current grids, and
# unbatched is fastest (single XLA op, no per-chunk Python overhead,
# no per-residual recompile). Set this to a positive int only when
# the live intermediate or AD tape (Mode 1 NUTS on a large galaxy)
# would not fit on the target GPU; chunking then runs as
# `jax.lax.scan` over `ceil(N_group / mode2_spot_batch)` chunks.
# mode2_spot_batch = 16

[model.priors.H0]
dist = "uniform"
low = 10.0
high = 200.0

[model.priors.sigma_pec]
