# Megamaser disk H0 model configuration.
#
# Set galaxy = "CGCG074-064" (or any galaxy name) for a single-galaxy run.
# Set galaxy = "joint" to fit all galaxies simultaneously with shared H0.
# Per-galaxy settings override the shared defaults below.

[inference]
sampler = "nss"  # "nuts" or "nss"
seed = 42

# NUTS settings
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
dense_mass_blocks = [
    ["D_c", "eta", "dv_sys", "i0", "di_dr", "Omega0", "dOmega_dr", "x0", "y0"],
    ["sigma_v_sys", "sigma_y_floor", "sigma_a_floor", "sigma_x_floor"],
    ["phi_mu_red", "phi_sigma_red", "phi_mu_blue", "phi_sigma_blue", "phi_mu_sys", "phi_sigma_sys"],
]
init_maxiter = 0
init_method = "sobol_adam"
max_tree_depth = 10

# NSS settings (Yallup+2025, arXiv:2601.23252)
n_live = 5000
num_mcmc_steps = 0  # 0 = use ndim (p=d recommendation)
num_delete = 250
termination = -3

[model]
which_run = "maser_disk"
Om = 0.315
galaxy = "NGC5765b"

use_selection = false
marginalise_r = true
phi_prior = false

# -----------------------------------------------------------------------
# PSO optimizer / Sobol seeding settings
# -----------------------------------------------------------------------

[optimise]
# H0 used ONLY to convert v_sys_obs -> D_estimate for narrowing the Sobol
# survey range of D_c. Does NOT affect inference or the PSO search bounds.
H0_for_D_estimate = 70.0
# Peculiar velocity scatter (km/s) for Sobol D_c range: D ± n_sigma * sigma_v / H0
D_sobol_sigma_v = 500.0
D_sobol_n_sigma = 5

# -----------------------------------------------------------------------
# Shared priors (apply to all galaxies unless overridden)
# -----------------------------------------------------------------------

[model.priors.H0]
dist = "delta"
value = 73.0

[model.priors.sigma_pec]
# dist = "uniform"
# low = 50.0
# high = 500.0
dist = "delta"
value = 250

# D prior: set D_lo, D_hi per galaxy below.
# The runner reads these and sets a Uniform(D_lo, D_hi) prior.


[model.priors.eta]
dist = "uniform"
low = 3.0
high = 9.0

[model.priors.R_phys]
dist = "uniform"
low = 0.01
high = 2.0

[model.priors.dv_sys]
dist = "normal"
loc = 0.0
scale = 300.0

[model.priors.x0]
dist = "normal"
loc = 0.0
scale = 500.0

[model.priors.y0]
dist = "normal"
loc = 0.0
scale = 500.0

[model.priors.i0]
dist = "sine_angle"
low = 60.0
high = 110.0

[model.priors.Omega0]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.dOmega_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.di_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.sigma_x_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_y_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_v_sys]
dist = "truncated_normal"
mean = 2.0
scale = 1.0
low = 0.0
high = 100.0

[model.priors.sigma_v_hv]
dist = "truncated_normal"
mean = 2.0
scale = 1.0
low = 0.0
high = 100.0

[model.priors.sigma_a_floor]
dist = "truncated_normal"
mean = 0.3
scale = 0.15
low = 0.0
high = 0.75

[model.priors.phi_mu_red]
dist = "uniform"
low = 0.0
high = 90.0

[model.priors.phi_sigma_red]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

[model.priors.phi_mu_blue]
dist = "uniform"
low = 0.0
high = 90.0

[model.priors.phi_sigma_blue]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

[model.priors.phi_mu_sys]
dist = "uniform"
low = -90.0
high = 90.0

[model.priors.phi_sigma_sys]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

# Eccentricity priors (only used when model/use_ecc = true)
[model.priors.ecc]
dist = "uniform"
low = 0.0
high = 0.5

[model.priors.omega_disk]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.D_lim]
dist = "uniform"
low = 50.0
high = 300.0

[model.priors.D_width]
dist = "uniform"
low = 5.0
high = 100.0

[io]
root_output = "results/Maser"

[io.maser_data]
root = "data/Megamaser"

# -----------------------------------------------------------------------
# Per-galaxy settings
# -----------------------------------------------------------------------

# D_ref, e_D_ref: reference distance [Mpc] and 1σ uncertainty.
# Sources: Pesce+2020 (MCP XIII) for megamaser galaxies,
#          Reid+2019 for NGC4258 (geometric parallax).
# e_D_ref = max(|+err|, |-err|) from asymmetric uncertainties.

[model.galaxies."CGCG074-064"]
v_sys_obs = 6908.9
D_lo = 66.0
D_hi = 126.0
# D_ref = 87.6, e_D_ref = 5.8 (Pesce+2020)

[model.galaxies."NGC4258"]
v_sys_obs = 472.0
D_lo = 4.0
D_hi = 10.0
# D_ref = 7.58, e_D_ref = 0.11 (Reid+2019)

[model.galaxies."NGC5765b"]
v_sys_obs = 8327.6
D_lo = 85.0
D_hi = 175.0
# D_ref = 112.2, e_D_ref = 5.4 (Pesce+2020)

[model.galaxies."NGC6264"]
v_sys_obs = 10131.3
D_lo = 70.0
D_hi = 250.0
# D_ref = 132.1, e_D_ref = 11.9 (Pesce+2020)

[model.galaxies."NGC6323"]
v_sys_obs = 7838.5
D_lo = 60.0
D_hi = 300.0
# D_ref = 109.4, e_D_ref = 30 (Pesce+2020)

[model.galaxies."UGC3789"]
v_sys_obs = 2905.4
D_lo = 10.0
D_hi = 70.0
# D_ref = 51.5, e_D_ref = 4.5 (Pesce+2020)
