# Megamaser disk H0 model configuration.
#
# Set galaxy = "CGCG074-064" (or any galaxy name) for a single-galaxy run.
# Set galaxy = "joint" to fit all galaxies simultaneously with shared H0.
# Per-galaxy settings override the shared defaults below.

[inference]
sampler = "nss"  # "nuts" or "nss"
seed = 42

# NUTS settings
num_warmup = 1000
num_samples = 1000
num_chains = 1
chain_method = "sequential"
dense_mass_blocks = [
    ["D_c", "eta", "dv_sys"],
    ["i0", "di_dr", "Omega0", "dOmega_dr"],
    ["x0", "y0"],
    ["phi_mu_red", "phi_sigma_red", "phi_mu_blue", "phi_sigma_blue", "phi_mu_sys", "phi_sigma_sys"],
]
init_maxiter = 0
init_method = "sobol_adam"
max_tree_depth = 10

# NSS settings (Yallup+2025, arXiv:2601.23252)
n_live = 3000
num_mcmc_steps = 0  # 0 = use ndim (p=d recommendation)
num_delete = 250
termination = -3

[model]
which_run = "maser_disk"
Om = 0.315
galaxy = "NGC5765b"

use_selection = false
marginalise_r = true
phi_prior = false

# -----------------------------------------------------------------------
# Shared priors (apply to all galaxies unless overridden)
# -----------------------------------------------------------------------

[model.priors.H0]
dist = "delta"
value = 73.0

[model.priors.sigma_pec]
# dist = "uniform"
# low = 50.0
# high = 500.0
dist = "delta"
value = 250

[model.priors.D]
dist = "data_estimate_uniform"
half_width = 40.0

[model.priors.log_MBH]
dist = "data_estimate_truncated_normal"
scale = 0.5
low = 6.0
high = 9.0

[model.priors.eta]
dist = "data_estimate_uniform"
half_width = 2.0

[model.priors.R_phys]
dist = "uniform"
low = 0.01
high = 3.0

[model.priors.dv_sys]
dist = "normal"
loc = 0.0
scale = 25.0

[model.priors.x0]
dist = "normal"
loc = 0.0
scale = 150.0

[model.priors.y0]
dist = "normal"
loc = 0.0
scale = 150.0

[model.priors.i0]
dist = "sine_angle"
low = 60.0
high = 110.0

[model.priors.Omega0]
dist = "uniform"
low = 0.0
high = 360.0

[model.priors.dOmega_dr]
dist = "uniform"
low = -20.0
high = 20.0

[model.priors.di_dr]
dist = "uniform"
low = -30.0
high = 30.0

[model.priors.sigma_x_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_y_floor]
dist = "truncated_normal"
mean = 10.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_v_sys]
dist = "truncated_normal"
mean = 2.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_v_hv]
dist = "truncated_normal"
mean = 2.0
scale = 5.0
low = 0.0
high = 100.0

[model.priors.sigma_a_floor]
dist = "truncated_normal"
mean = 0.1
scale = 0.2
low = 0.0
high = 0.3

[model.priors.phi_mu_red]
dist = "uniform"
low = 0.0
high = 90.0

[model.priors.phi_sigma_red]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

[model.priors.phi_mu_blue]
dist = "uniform"
low = 0.0
high = 90.0

[model.priors.phi_sigma_blue]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

[model.priors.phi_mu_sys]
dist = "uniform"
low = -90.0
high = 90.0

[model.priors.phi_sigma_sys]
dist = "truncated_normal"
mean = 5.0
scale = 10.0
low = 0.1
high = 90.0

[model.priors.D_lim]
dist = "uniform"
low = 50.0
high = 300.0

[model.priors.D_width]
dist = "uniform"
low = 5.0
high = 100.0

[io]
root_output = "results/Maser"

[io.maser_data]
root = "data/Megamaser"

# -----------------------------------------------------------------------
# Per-galaxy settings
# -----------------------------------------------------------------------

[model.galaxies."CGCG074-064"]
v_sys_obs = 6908.9

[model.galaxies."NGC5765b"]
v_sys_obs = 8327.6

[model.galaxies."NGC6264"]
v_sys_obs = 10131.3

[model.galaxies."NGC6323"]
v_sys_obs = 7838.5

[model.galaxies."UGC3789"]
v_sys_obs = 2905.4
