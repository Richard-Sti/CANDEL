[optimise]
# Differential evolution (DE) MAP optimizer
log2_N = 16
pop_size = 1000
max_generations = 5000
patience = 100
eval_chunk = 4
sobol_n_sigma = 5
min_dist_frac = 0.005
H0_for_D_estimate = 70.0
D_sobol_sigma_v = 500.0
D_sobol_n_sigma = 5

[joint.priors.sigma_pec]
dist = "maxwell"
scale = 156.7

[io]
root_output = "results/Megamaser"

[io.maser_data]
root = "data/Megamaser"

[convergence]
# Auto-run after NUTS/NSS finishes. Compares the production phi/r marginal
# against a dense brute-force reference at `n_draws` posterior samples.
auto_check = true
n_draws = 8
seed = 0
save_json = true

[convergence.mode2_reference]
# Full-2pi phi x log-r brute force. The reference is the gold standard
# the convergence sweep is measured against, so it uses float64 — a
# float32 reference's own ~10⁻⁷ rounding accumulated over n_r × n_phi
# ≈ 2.5×10⁹ logsumexp terms can leave a sub-nat systematic that
# every test row inherits.
# spot_batch trades dispatch overhead for live memory. The kernel
# holds ~6 simultaneous (spot_batch, r_chunk, n_phi) × dtype arrays
# (X, Y, V, A from predict_* plus the running chi2 tally), so the
# peak request is ~6 × spot_batch × r_chunk × n_phi × 8B. With the
# defaults below that is ~6 × 4 × 1000 × 50001 × 8B ≈ 9.6 GB —
# safe on a 16 GB GPU. Push higher via --ref-spot-batch on bigger
# cards (24 GB → ~8, 40 GB → ~16).
n_r = 50000
n_phi = 50001
r_chunk = 1000
spot_batch = 4
dtype = "float64"

[convergence.mode1_reference]
# Per-type full-2pi phi brute force at the sampled r_ang.
n_phi = 200001
spot_batch = 200
dtype = "float64"

[convergence.mode1_gradient_reference]
# Full-2pi phi reference at sampled r_ang, used for the AD gradient
# check in convergence_phi_marginal.py. Shares n_phi / spot_batch
# with [convergence.mode1_reference] but lists them here explicitly
# so the two tests can diverge if needed.
n_phi = 200001
spot_batch = 200
dtype = "float64"
